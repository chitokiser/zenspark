<!-- ===== Site Header Component ===== -->
<header id="site-header">
  <div class="container">
    <div class="header-inner">

      <!-- Logo -->
      <a href="index.html" class="header-logo">
        <span class="header-logo__main">Zen Spark Gallery</span>
        <span class="header-logo__sub">禪 · Art · Commerce</span>
      </a>

      <!-- Desktop Nav -->
      <nav class="header-nav">
        <a href="index.html#about"    data-i18n="nav_intro">소개</a>
        <a href="community.html"      data-i18n="nav_community">커뮤니티</a>
        <a href="services.html"       data-i18n="nav_services">서비스</a>
      </nav>

      <!-- Actions -->
      <div class="header-actions">
        <!-- Language Toggle -->
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="ko">KR</button>
          <button class="lang-btn"        data-lang="en">EN</button>
        </div>

        <!-- Login Button (shown when not logged in) -->
        <button id="header-login-btn" class="header-login-btn" data-i18n="btn_login">로그인</button>

        <!-- User Menu (shown when logged in) -->
        <div id="header-user-menu" class="user-menu" style="display:none;">
          <div id="header-avatar" class="user-menu__avatar" title="My Page"></div>
          <div class="user-menu__dropdown">
            <span id="header-username" style="display:block;padding:0.6rem 1.25rem;font-size:0.72rem;letter-spacing:0.05em;color:var(--gray-4);border-bottom:1px solid var(--gray-6);"></span>
            <a href="https://jump22.netlify.app/mypage" target="_blank" data-i18n="btn_mypage">마이페이지</a>
            <div class="divider"></div>
            <button id="header-logout-btn" class="logout-btn" data-i18n="btn_logout">로그아웃</button>
          </div>
        </div>

        <!-- Hamburger (mobile) -->
        <button id="hamburger" class="hamburger" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Mobile Nav Overlay -->
<nav id="mobile-nav" class="mobile-nav">
  <a href="index.html"     data-i18n="nav_intro">소개</a>
  <a href="community.html" data-i18n="nav_community">커뮤니티</a>
  <a href="services.html"  data-i18n="nav_services">서비스</a>
  <div style="display:flex;gap:1rem;margin-top:2rem;">
    <button class="lang-btn" data-lang="ko" style="font-size:0.85rem;padding:0.4rem 1rem;border:1px solid var(--gray-5);border-radius:20px;">KR</button>
    <button class="lang-btn" data-lang="en" style="font-size:0.85rem;padding:0.4rem 1rem;border:1px solid var(--gray-5);border-radius:20px;">EN</button>
  </div>
</nav>
